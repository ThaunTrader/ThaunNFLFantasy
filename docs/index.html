<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ThaunNFL — Fantasy Manager</title>
<meta name="theme-color" content="#10161d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ThaunNFL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10161d;
    --card: #18212b;
    --border: #24303c;
    --text: #e8edf2;
    --muted: #8a97a5;
    --rojo: #ff5a52;
    --ambar: #ffb224;
    --verde: #3ecf8e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.4;
    padding: env(safe-area-inset-top) 14px calc(76px + env(safe-area-inset-bottom));
    max-width: 560px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 18px 2px 4px;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  h1 span { color: var(--rojo); }
  #actualizar {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 12px;
    font: 500 13px 'Barlow', sans-serif;
    cursor: pointer;
  }
  #actualizar:active { background: var(--card); }
  #meta {
    color: var(--muted);
    font-size: 12.5px;
    padding: 0 2px 14px;
  }
  #resumen {
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: .03em;
    text-transform: uppercase;
    display: none;
  }
  #resumen.ok    { display: block; background: rgba(62,207,142,.10); color: var(--verde); border: 1px solid rgba(62,207,142,.35); }
  #resumen.alerta{ display: block; background: rgba(255,90,82,.10);  color: var(--rojo);  border: 1px solid rgba(255,90,82,.35); }

  #filtro {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .chip {
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    border-radius: 999px;
    padding: 5px 14px;
    font: 500 13px 'Barlow', sans-serif;
    cursor: pointer;
  }
  .chip.activo { border-color: var(--text); color: var(--text); }

  .equipo {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--verde);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .equipo.duda { border-left-color: var(--ambar); }
  .equipo.out  { border-left-color: var(--rojo); }

  .cabecera {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 13px 14px;
    background: none;
    border: none;
    color: inherit;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
  }
  .nombres { min-width: 0; }
  .nombre-equipo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: .02em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nombre-liga {
    color: var(--muted);
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .marcador {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: .03em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .marcador .r { color: var(--rojo); }
  .marcador .a { color: var(--ambar); }
  .marcador .v { color: var(--verde); }

  .detalle { display: none; border-top: 1px solid var(--border); }
  .equipo.abierto .detalle { display: block; }
  .jugador {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
  }
  .jugador + .jugador { border-top: 1px solid rgba(36,48,60,.6); }
  .estado {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .05em;
    border-radius: 6px;
    padding: 2px 8px;
    flex-shrink: 0;
    min-width: 40px;
    text-align: center;
  }
  .estado.rojo  { background: rgba(255,90,82,.15);  color: var(--rojo); }
  .estado.ambar { background: rgba(255,178,36,.15); color: var(--ambar); }
  .j-info { min-width: 0; flex: 1; }
  .j-nombre { font-weight: 600; }
  .j-sub { color: var(--muted); font-size: 12.5px; }
  .j-grupo {
    color: var(--muted);
    font-size: 12px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 7px;
  }
  .j-grupo.titular { color: var(--text); border-color: var(--muted); }

  #estado-app {
    text-align: center;
    color: var(--muted);
    padding: 40px 10px;
  }

  .seccion-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 2px 8px;
  }
  #resumen-ligas {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .fila-liga {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
  }
  .fila-liga + .fila-liga { border-top: 1px solid rgba(36,48,60,.6); }
  .fl-info { min-width: 0; flex: 1; }
  .fl-liga {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16.5px;
    letter-spacing: .02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fl-sub {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 1px;
  }
  .fl-badge {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 11px;
    letter-spacing: .03em;
  }
  .fl-record {
    text-align: right;
    flex-shrink: 0;
  }
  .fl-marcador {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: .02em;
  }
  .fl-pct {
    color: var(--muted);
    font-size: 12px;
  }

  .vista { display: none; }
  .vista.activa { display: block; }

  #nav-inferior {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 10;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 9px 4px 8px;
    background: none;
    border: none;
    color: var(--muted);
    font: 500 10.5px 'Barlow', sans-serif;
    letter-spacing: .02em;
    cursor: pointer;
  }
  .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .nav-item.activo { color: var(--rojo); }
  .nav-badge {
    position: absolute;
    margin-left: 14px;
    margin-top: -2px;
    background: var(--rojo);
    color: #10161d;
    font-size: 9.5px;
    font-weight: 700;
    border-radius: 999px;
    min-width: 14px;
    height: 14px;
    line-height: 14px;
    text-align: center;
    padding: 0 3px;
  }
</style>
</head>
<body>

<header>
  <h1>Thaun<span>NFL</span></h1>
  <button id="actualizar">Actualizar</button>
</header>
<div id="meta"></div>
<div id="estado-app">Cargando…</div>

<div class="vista activa" id="vista-ligas">
  <div id="resumen"></div>
  <div id="bloque-resumen-ligas" style="display:none">
    <div class="seccion-titulo">Tus ligas</div>
    <div id="resumen-ligas"></div>
  </div>
</div>

<div class="vista" id="vista-medico">
  <div id="filtro" style="display:none">
    <button class="chip activo" data-f="todos">Todos</button>
    <button class="chip" data-f="titulares">Solo titulares</button>
  </div>
  <div id="lista"></div>
</div>

<div class="vista" id="vista-trades">
  <div id="estado-trades" style="text-align:center;color:var(--muted);padding:40px 10px;">Cargando…</div>
  <div id="lista-trades"></div>
</div>

<nav id="nav-inferior">
  <button class="nav-item activo" data-vista="ligas">
    <svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/></svg>
    Ligas
  </button>
  <button class="nav-item" data-vista="medico" style="position:relative">
    <svg viewBox="0 0 24 24"><path d="M9 3v6M6 6h6M17 3v8a5 5 0 01-10 0"/><path d="M12 15v6M9 21h6"/></svg>
    Parte médico
    <span class="nav-badge" id="badge-medico" style="display:none">0</span>
  </button>
  <button class="nav-item" data-vista="trades" style="position:relative">
    <svg viewBox="0 0 24 24"><path d="M7 10l-4 4 4 4M3 14h13a4 4 0 004-4M17 14l4-4-4-4M21 10H8a4 4 0 00-4 4"/></svg>
    Trades
    <span class="nav-badge" id="badge-trades" style="display:none">0</span>
  </button>
</nav>

<script>
let datos = null;
let filtro = 'todos';
const abiertos = new Set();

const GRUPOS = { START: 'Titular', BENCH: 'Banquillo', INJURED: 'IR', TAXI: 'Taxi' };

function cargar() {
  document.getElementById('estado-app').textContent = 'Cargando…';
  document.getElementById('estado-app').style.display = 'block';
  fetch('data/status.json?ts=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(d => { datos = d; render(); })
    .catch(() => {
      document.getElementById('estado-app').textContent =
        'No se pudieron cargar los datos. Comprueba la conexión y vuelve a intentarlo.';
    });
}

function render() {
  const meta = document.getElementById('meta');
  const resumen = document.getElementById('resumen');
  const lista = document.getElementById('lista');
  const estadoApp = document.getElementById('estado-app');
  const filtroBox = document.getElementById('filtro');

  const fecha = new Date(datos.generado);
  meta.textContent = 'Actualizado ' + fecha.toLocaleString('es-ES', {
    weekday: 'short', day: 'numeric', month: 'short',
    hour: '2-digit', minute: '2-digit'
  });

  const ligas = datos.ligas || [];
  if (!ligas.length) {
    estadoApp.textContent = 'No se encontraron ligas en los datos.';
    return;
  }
  estadoApp.style.display = 'none';
  filtroBox.style.display = 'flex';
  renderResumenLigas(ligas);

  const visibles = l => (l.alertas || []).filter(a =>
    filtro === 'todos' || a.grupo === 'START');

  let totalJug = 0, totalEq = 0;
  ligas.forEach(l => {
    const n = visibles(l).length;
    if (n > 0) { totalJug += n; totalEq++; }
  });
  resumen.className = totalJug ? 'alerta' : 'ok';
  resumen.textContent = totalJug
    ? `${totalJug} jugador${totalJug > 1 ? 'es' : ''} en alerta en ${totalEq} equipo${totalEq > 1 ? 's' : ''}`
    : 'Todo en orden';

  const badge = document.getElementById('badge-medico');
  if (totalEq > 0) {
    badge.style.display = 'block';
    badge.textContent = totalEq;
  } else {
    badge.style.display = 'none';
  }

  const orden = [...ligas].sort((a, b) => {
    const peor = l => visibles(l).some(x => x.rojo) ? 0 : visibles(l).length ? 1 : 2;
    return peor(a) - peor(b);
  });

  lista.innerHTML = '';
  orden.forEach(l => {
    const alertas = visibles(l);
    const rojos = alertas.filter(a => a.rojo).length;
    const dudas = alertas.length - rojos;
    const clase = rojos ? 'out' : dudas ? 'duda' : '';
    const clave = String(l.league_id);

    const card = document.createElement('div');
    card.className = 'equipo ' + clase + (abiertos.has(clave) && alertas.length ? ' abierto' : '');

    let marcador = '<span class="v">✓ OK</span>';
    if (alertas.length) {
      const partes = [];
      if (rojos) partes.push(`<span class="r">${rojos} OUT</span>`);
      if (dudas) partes.push(`<span class="a">${dudas} Q</span>`);
      marcador = partes.join(' · ');
    }

    let html = `
      <button class="cabecera" data-k="${clave}" ${alertas.length ? '' : 'disabled'}>
        <div class="nombres">
          <div class="nombre-equipo">${esc(l.liga)}</div>
          <div class="nombre-liga">${esc(l.equipo)}</div>
        </div>
        <div class="marcador">${marcador}</div>
      </button>`;

    if (l.error) {
      html += `<div class="detalle" style="display:block"><div class="jugador j-sub">Error al leer este equipo: ${esc(l.error)}</div></div>`;
    } else if (alertas.length) {
      html += '<div class="detalle">' + alertas.map(a => `
        <div class="jugador">
          <span class="estado ${a.rojo ? 'rojo' : 'ambar'}">${esc(etiqueta(a.estado))}</span>
          <div class="j-info">
            <div class="j-nombre">${esc(a.nombre)}</div>
            <div class="j-sub">${esc(a.posicion)} · ${esc(a.equipo_nfl)}${a.detalle ? ' · ' + esc(a.detalle) : ''}</div>
          </div>
          ${a.grupo ? `<span class="j-grupo ${a.grupo === 'START' ? 'titular' : ''}">${esc(GRUPOS[a.grupo] || a.grupo)}</span>` : ''}
        </div>`).join('') + '</div>';
    }

    card.innerHTML = html;
    lista.appendChild(card);
  });

  lista.querySelectorAll('.cabecera:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.k;
      abiertos.has(k) ? abiertos.delete(k) : abiertos.add(k);
      btn.parentElement.classList.toggle('abierto');
    });
  });
}

function renderResumenLigas(ligas) {
  const bloque = document.getElementById('bloque-resumen-ligas');
  const cont = document.getElementById('resumen-ligas');

  if (!ligas.length) { bloque.style.display = 'none'; return; }
  bloque.style.display = 'block';

  const orden = [...ligas].sort((a, b) => {
    const va = a.record?.victorias ?? -1;
    const vb = b.record?.victorias ?? -1;
    if (vb !== va) return vb - va;
    return (b.record?.pct ?? 0) - (a.record?.pct ?? 0);
  });

  cont.innerHTML = orden.map(l => {
    const r = l.record;
    const marcador = r
      ? `${r.victorias}-${r.derrotas}${r.empates ? '-' + r.empates : ''}`
      : '—';
    const pct = r && r.pct != null ? (r.pct * 100).toFixed(0) + '%' : '';
    const rank = r && r.rank ? `#${r.rank}` : '';
    const clave = 'liga-' + l.league_id;

    return `
      <button class="fila-liga" data-k="${clave}" style="width:100%;border:none;background:none;text-align:left;cursor:pointer;font:inherit;color:inherit;">
        <div class="fl-info">
          <div class="fl-liga">${esc(l.liga)}</div>
          <div class="fl-sub">
            <span>${esc(l.equipo)}</span>
            ${l.tipo ? `<span class="fl-badge">${esc(l.tipo)}</span>` : ''}
            ${l.formato ? `<span class="fl-badge">${esc(l.formato)}</span>` : ''}
            ${!l.tipo && !l.formato ? '<span class="fl-badge">Formato no documentado</span>' : ''}
          </div>
        </div>
        <div class="fl-record">
          <div class="fl-marcador">${marcador} ${rank}</div>
          <div class="fl-pct">${pct}</div>
        </div>
      </button>
      <div class="fl-calendario" id="cal-${clave}" style="display:none;padding:4px 14px 12px;"></div>`;
  }).join('');

  cont.querySelectorAll('.fila-liga').forEach(btn => {
    btn.addEventListener('click', () => toggleCalendario(btn.dataset.k));
  });
}

let calendarioData = null;

function cargarCalendario() {
  fetch('data/calendario.json?ts=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(d => { calendarioData = d; })
    .catch(() => { calendarioData = null; });
}

function toggleCalendario(clave) {
  const cont = document.getElementById('cal-' + clave);
  const abierto = cont.style.display !== 'none';
  cont.style.display = abierto ? 'none' : 'block';
  if (abierto || cont.dataset.pintado) return;

  const leagueId = clave.replace('liga-', '');
  const liga = calendarioData?.ligas?.find(l => String(l.league_id) === leagueId);

  if (!calendarioData) {
    cont.innerHTML = '<div style="color:var(--muted);font-size:12.5px;">Calendario no disponible todavía.</div>';
    return;
  }
  if (!liga || !liga.semanas?.length) {
    cont.innerHTML = '<div style="color:var(--muted);font-size:12.5px;">Sin datos de calendario para esta liga.</div>';
    return;
  }

  cont.innerHTML = liga.semanas.map(s => {
    if (s.error) return '';
    const jugado = s.jugado;
    const gano = s.resultado === 'WIN';
    const perdio = s.resultado === 'LOSE';
    const color = jugado ? (gano ? 'var(--verde)' : perdio ? 'var(--rojo)' : 'var(--muted)') : 'var(--muted)';
    const marcador = jugado
      ? `${s.mis_puntos ?? '—'} - ${s.puntos_rival ?? '—'}`
      : 'Pendiente';
    return `
      <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:12.5px;border-top:1px solid rgba(36,48,60,.5);">
        <span style="color:var(--muted);">S${s.semana} ${s.local ? 'vs' : '@'} ${esc(s.rival)}</span>
        <span style="color:${color};font-weight:600;">${marcador}</span>
      </div>`;
  }).join('') || '<div style="color:var(--muted);font-size:12.5px;">Sin semanas registradas.</div>';

  cont.dataset.pintado = '1';
}

function etiqueta(estado) {
  return { QUESTIONABLE: 'Q', DOUBTFUL: 'D', OUT: 'OUT', IR: 'IR' }[estado] || estado;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.getElementById('actualizar').addEventListener('click', cargar);
document.querySelectorAll('#filtro .chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#filtro .chip').forEach(x => x.classList.remove('activo'));
    c.classList.add('activo');
    filtro = c.dataset.f;
    if (datos) render();
  });
});

function cargarTrades() {
  const estadoTrades = document.getElementById('estado-trades');
  fetch('data/trades.json?ts=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(d => renderTrades(d))
    .catch(() => {
      estadoTrades.style.display = 'block';
      estadoTrades.textContent = 'No se pudieron cargar los trades.';
    });
}

function renderTrades(datosTrades) {
  const estadoTrades = document.getElementById('estado-trades');
  const lista = document.getElementById('lista-trades');
  const badge = document.getElementById('badge-trades');

  const ligas = (datosTrades.ligas || []).filter(l => (l.trades || []).length);
  const abiertosTotal = (datosTrades.ligas || [])
    .flatMap(l => l.trades || [])
    .filter(t => t.estado === 'TRADE_STATUS_OPEN').length;

  badge.style.display = abiertosTotal > 0 ? 'block' : 'none';
  badge.textContent = abiertosTotal;

  if (!ligas.length) {
    estadoTrades.style.display = 'block';
    estadoTrades.textContent = 'Sin trades recientes en tus ligas.';
    lista.innerHTML = '';
    return;
  }
  estadoTrades.style.display = 'none';

  const ETIQUETAS = {
    TRADE_STATUS_OPEN: 'Pendiente',
    TRADE_STATUS_EXECUTED: 'Completado',
    TRADE_STATUS_REJECTED: 'Rechazado',
    TRADE_STATUS_VETOED: 'Vetado',
    TRADE_STATUS_CANCELED: 'Cancelado',
    TRADE_STATUS_INVALIDATED: 'Invalidado',
  };

  lista.innerHTML = ligas.map(l => `
    <div class="seccion-titulo">${esc(l.liga)}</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:6px;">
      ${l.trades.map(t => `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
            <span style="font-weight:600;font-size:13px;">${esc(ETIQUETAS[t.estado] || t.estado || 'Estado desconocido')}</span>
          </div>
          ${t.lados.map(lado => `
            <div style="font-size:12.5px;color:var(--muted);margin-top:2px;">
              <strong style="color:var(--text);">${esc(lado.equipo)}</strong> recibe: ${lado.recibe.length ? lado.recibe.map(esc).join(', ') : '—'}
            </div>`).join('')}
        </div>`).join('')}
    </div>
  `).join('');
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('activo'));
    document.querySelectorAll('.vista').forEach(x => x.classList.remove('activa'));
    btn.classList.add('activo');
    document.getElementById('vista-' + btn.dataset.vista).classList.add('activa');
  });
});

cargar();
cargarCalendario();
cargarTrades();
</script>
</body>
</html>
