name: NFL Lineup Injury Check

on:
  schedule:
    - cron: '0 17-23 * * 0,1,4'
  workflow_dispatch:

jobs:
  check-lineup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - - name: Debug scoreboard
        env:
          FLEAFLICKER_USER_ID: ${{ secrets.FLEAFLICKER_USER_ID }}
        run: |
          python - <<'EOF'
          import requests, json

          BASE_URL = "https://www.fleaflicker.com/api"
          LEAGUE_ID = 332572

          scoreboard = requests.get(f"{BASE_URL}/FetchLeagueScoreboard", params={"sport":"NFL","league_id":LEAGUE_ID}).json()
          print(json.dumps(scoreboard, indent=2))
          EOF
