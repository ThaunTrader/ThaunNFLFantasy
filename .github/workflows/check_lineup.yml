name: NFL Lineup Injury Check

on:
  schedule:
    - cron: '0 17-23 * * 0,1,4'
  workflow_dispatch:

jobs:
  check-lineup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Debug scoreboard
        env:
          FLEAFLICKER_USER_ID: ${{ secrets.FLEAFLICKER_USER_ID }}
        run: |
          python - <<'EOF'
          import requests, json, os
          BASE_URL = "https://www.fleaflicker.com/api"
          USER_ID = os.environ["FLEAFLICKER_USER_ID"]
          leagues = requests.get(f"{BASE_URL}/FetchUserLeagues", params={"sport":"NFL","user_id":USER_ID}).json()["leagues"]
          for league in leagues:
              if "IDP16" in league.get("name",""):
                  league_id = league["id"]
                  scoreboard = requests.get(f"{BASE_URL}/FetchLeagueScoreboard", params={"sport":"NFL","league_id":league_id}).json()
                  print(json.dumps(scoreboard, indent=2))
                  break
          EOF
