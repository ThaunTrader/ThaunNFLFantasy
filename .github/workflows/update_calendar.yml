name: Update Calendar

on:
  schedule:
    - cron: '0 10 * * 2'   # cada martes a las 10:00 UTC (tras el Monday Night)
  workflow_dispatch:        # ejecución manual

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Export calendar
        env:
          FLEAFLICKER_USER_ID: ${{ secrets.FLEAFLICKER_USER_ID }}
        run: python export_calendar.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/calendario.json
          git diff --staged --quiet || (git commit -m "Actualizar calendario y resultados" && git push)
