name: Update App Status

on:
  schedule:
    - cron: '17 5,17 * * *'   # cada 12 horas (05:17 y 17:17 UTC)
  workflow_dispatch:          # ejecución manual

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Export status
        env:
          FLEAFLICKER_USER_ID: ${{ secrets.FLEAFLICKER_USER_ID }}
        run: python export_status.py

      - name: Export trades
        env:
          FLEAFLICKER_USER_ID: ${{ secrets.FLEAFLICKER_USER_ID }}
        run: python export_trades.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json docs/data/trades.json
          git diff --staged --quiet || (git commit -m "Actualizar estado y trades" && git push)
